services:
  db:
    image: mariadb:11
    container_name: wptb-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wptb_net
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  wordpress:
    image: wordpress:6-fpm
    container_name: wptb-wordpress
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${DB_PREFIX:-wp_}
    volumes:
      - wp_data:/var/www/html
      - ../:/var/www/html/wp-content/plugins/wp-telegram-bridge:ro
    networks:
      - wptb_net
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: wptb-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - wp_data:/var/www/html:ro
    networks:
      - wptb_net
    depends_on:
      - wordpress

  # LocalTunnel для публичного HTTPS URL (Telegram webhook)
  tunnel:
    image: node:20-alpine
    container_name: wptb-tunnel
    restart: unless-stopped
    command: >
      sh -c "npm install -g localtunnel &&
             lt --port 8443 --local-host nginx"
    networks:
      - wptb_net
    depends_on:
      - nginx

volumes:
  db_data:
  wp_data:

networks:
  wptb_net:
    driver: bridge
